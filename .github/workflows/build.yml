name: build
on:
  push:
    branches: [feat/cross-platform, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          target: x86_64-pc-windows-msvc
      - name: Build
        run: cd backup-rs && cargo build --release
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-x64
          path: backup-rs/target/release/backup.exe
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          files: backup-rs/target/release/backup.exe
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
